meta:
  title: Image to Favicon
  author: Peter Nelson
  description: >
    Create icon files from a square image. By default, creates a single
    multi-resolution .ico file with 256x256, 128x128, 64x64, 32x32, and
    16x16 versions (browsers choose the appropriate size automatically).
    You can also export them as separate .pngs instead.
  extensions:
    - ico
    - png
interface:
  inputAccept: image/*
  inputFiles: SINGLE
  outputFiles: ANY
  terminal: FATAL_ONLY
  form:
    autofocusedName: input
    children:
      - type: DIV
        dir: ROW
        children:
          - type: DIV
            dir: COL
            name: start
            children:
              - type: LABEL
                text: Input Image
                child:
                  type: FILE
                  name: input
                  submit: true
          - type: DIV
            dir: COL
            name: selected
            hidden: true
            children:
              - type: LABEL
                text: Output Format
                child:
                  type: SELECT
                  name: output_format
                  options:
                    - text: Single .ico file
                      value: ico
                      selected: true
                    - text: Separate .png files
                      value: png
              - type: DIV
                dir: ROW
                children:
                  - type: BUTTON
                    text: Start Over
                    name: reset
                    value: x
                  - type: BUTTON
                    text: Download
                    name: download
                    value: x
              - type: LABEL
                text: Preview
                child:
                  type: CANVAS
                  name: preview
                  height: 256
                  width: 496
runtime:
  wasmModules:
    - name: imagemagick
